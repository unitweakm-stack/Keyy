name: 🔐 BackeerLoader Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Theos + ldid
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          curl -LO https://github.com/optimo/ldid/releases/latest/download/ldid
          chmod +x ldid
          sudo mv ldid /usr/local/bin/
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin:/usr/local/bin" >> $GITHUB_PATH

      - name: 🧹 Clean & Build
        run: |
          rm -rf .theos obj/
          make clean all
        env:
          THEOS: ~/theos

      - name: 📤 Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: BackeerLoader-Signed
          path: |
            .theos/obj/debug/BackeerLoader.dylib
          retention-days: 30
