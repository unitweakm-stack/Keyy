name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Theos-ni uy papkasiga yuklash
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # SDK-larni yuklash (Dylib yasash uchun shart)
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
          # Muhitni sozlash
          echo "THEOS=<LaTex>$HOME/theos" >> $</LaTex>GITHUB_ENV
          echo "<LaTex>$HOME/theos/bin" >> $</LaTex>GITHUB_PATH

      - name: Build Dylib
        run: |
          # Theos yo'lini aniq ko'rsatib build qilish
          export THEOS=<LaTex>$HOME/theos
          $</LaTex>THEOS/bin/make clean all
        env:
          THEOS: <LaTex>${{ env.THEOS }}

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: BackeerLoader-Dylib
          path: obj/*.dylib
