name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          export THEOS=~/theos
          git clone --recursive https://github.com/theos/theos.git <LaTex>$THEOS
          echo "THEOS=~/theos" >> $</LaTex>GITHUB_ENV

      - name: Setup iOS SDK
        run: |
          # SDK-larni yuklash (iOS 14.5 SDK ko'pincha barqaror ishlaydi)
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Build Dylib
        run: |
          # Makefile-dagi ARCHS va TARGET-ga qarab build qilish
          make
        env:
          THEOS: ${{ env.THEOS }}

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: BackeerLoader-Dylib
          path: obj/*.dylib
