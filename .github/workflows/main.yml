name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Theos-ni yuklash (submodule-lar bilan birga)
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # SDK-larni yuklash
          rm -rf ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
          # THEOS muhitini sozlash
          echo "THEOS=~/theos" >> <LaTex>$GITHUB_ENV
          echo "$</LaTex>HOME/theos/bin" >> $GITHUB_PATH

      - name: Build Dylib
        run: |
          # Makefile-dagi xatoliklarni oldini olish uchun THEOS-ni aniq ko'rsatish
          export THEOS=~/theos
          make clean all
        env:
          THEOS: ~/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: BackeerLoader-Dylib
          path: obj/*.dylib
