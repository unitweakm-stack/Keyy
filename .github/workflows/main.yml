name: Build iOS Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # Theos-ni yuklash (agar mavjud bo'lmasa)
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # SDK-larni tekshirish va yuklash
          if [ ! -d "~/theos/sdks" ] || [ -z "$(ls -A ~/theos/sdks)" ]; then
            echo "SDK-lar yuklanmoqda..."
            git clone https://github.com/theos/sdks.git ~/theos/sdks
          else
            echo "SDK-lar allaqachon mavjud, yuklash shart emas."
          fi
          
          # Atrof-muhit o'zgaruvchilarini sozlash
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Build Dylib
        run: |
          # Loyihani kompyutsiya qilish
          make clean all
        env:
          THEOS: ~/theos

      - name: Upload Dylib
        uses: actions/upload-artifact@v4
        with:
          name: BackeerLoader-Dylib
          path: obj/*.dylib
