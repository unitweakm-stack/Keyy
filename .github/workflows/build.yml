name: Build Tweak

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-latest   # yoki ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/setup-theos@v2

      - name: Install ldid (agar kerak bo‘lsa)
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install ldid
          else
            sudo apt-get update && sudo apt-get install -y ldid
          fi

      - name: Build tweak
        run: |
          export THEOS=$HOME/theos
          make DEBUG=0 FINALPACKAGE=1
