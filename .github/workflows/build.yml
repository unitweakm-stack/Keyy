name: 🔐 BackeerLoader Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: 📥 Repository yuklash
      uses: actions/checkout@v4

    - name: ⚙️ Theos va ldid o'rnatish
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -LO https://github.com/optimo/ldid/releases/download/2.1.3/ldid
        chmod +x ldid
        mv ldid ~/theos/bin/ldid
        
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH
        echo "export PATH=\"$THEOS/bin:\$PATH\"" >> $GITHUB_ENV

    - name: 🧹 Tozalash va Build
      run: |
        rm -rf .theos obj/
        make clean all
      env:
        THEOS: ~/theos

    - name: 📋 Build ma'lumotlari
      run: |
        ls -la .theos/obj/debug/
        file .theos/obj/debug/BackeerLoader.dylib
        dwarfdump --uuid .theos/obj/debug/BackeerLoader.dylib

    - name: 📤 Dylib yuklab olish
      uses: actions/upload-artifact@v4
      with:
        name: BackeerLoader-Signed
        path: |
          .theos/obj/debug/BackeerLoader.dylib
        retention-days: 30

    - name: ✅ Muvaffaqiyat
      run: echo "✅ BackeerLoader.dylib TAYYOR!"
